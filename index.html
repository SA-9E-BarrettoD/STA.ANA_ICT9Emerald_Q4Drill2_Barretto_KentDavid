<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heat Index Calculator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="main-wrapper">
    <div class="heat-card">

        <h2>Heat Index Calculator</h2>
        <p class="subtitle">Enter temperature and humidity to check heat level</p>

        <input type="number" id="temp" class="form-control mb-3" placeholder="Temperature (°C)">
        <input type="number" id="humid" class="form-control mb-3" placeholder="Humidity (%)">

        <button class="btn btn-warning w-100" onclick="computeHeat()">Calculate</button>

        <div id="output" class="mt-3"></div>

    </div>
</div>

<script src="main.js"></script>
</body>
</html>
